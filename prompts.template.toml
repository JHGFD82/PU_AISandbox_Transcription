# prompts.toml — Transcription plugin prompt fragment overrides
# ─────────────────────────────────────────────────────────────────────────────
# HOW TO USE:
#   1. Copy this file to prompts.toml in the PU_AISandbox repository root.
#   2. Uncomment only the keys you want to override and replace the value.
#   3. Leave all other keys absent — they fall back to the built-in defaults.
#
# prompts.toml is git-ignored and will not be committed.
# Full default text for every key is in
#   plugins/transcription/src/services/prompts/ocr_fragments.py
#
# PLACEHOLDERS: Some fragments contain {placeholder} tokens that are filled
# in at runtime. If you override such a fragment, you must keep the same
# placeholders or the prompt will be missing information.
# ─────────────────────────────────────────────────────────────────────────────


